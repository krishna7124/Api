openapi: 3.0.3
info:
  title: CISA KEV Feed (No Auth)
  version: 1.0.0
  description: Public Known Exploited Vulnerabilities JSON feed (no authentication).
servers:
  - url: https://www.cisa.gov
paths:
  /sites/default/files/feeds/known_exploited_vulnerabilities.json:
    get:
      summary: Get CISA KEV JSON feed
      description: Returns the full Known Exploited Vulnerabilities catalog as JSON.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
